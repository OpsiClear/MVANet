<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Segmentation Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <!-- Header -->
    <div class="dashboard-header">
        <div class="container">
            <h1 class="mb-0 fw-bold">Image Segmentation</h1>
        </div>
    </div>

    <div class="container">
        <!-- Submit Job Form -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">New Job</h5>
            </div>
            <div class="card-body">
                <form id="jobForm">
                    <div class="mb-3">
                        <label for="inputFolder" class="form-label fw-medium">Input Folder Path</label>
                        <input type="text" class="form-control" id="inputFolder" placeholder="\\server\share\folder" required>
                        <div class="form-text">Enter the full path to the folder containing images</div>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="useTta" checked>
                            <label class="form-check-label" for="useTta">Use Test-Time Augmentation</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Job</button>
                </form>
            </div>
        </div>
        
        <!-- Console Output -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-terminal me-2"></i>Console Output</h5>
                <div>
                    <button id="showLatestImage" class="btn btn-sm btn-outline-primary me-2">
                        <i class="bi bi-image me-1"></i>Latest Image
                    </button>
                    <button id="clearConsole" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-trash me-1"></i>Clear
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div id="consoleOutput" class="console-output">
                    <div class="console-line text-muted">Ready to process images...</div>
                </div>
            </div>
        </div>


    </div>



    <!-- Latest Image Modal -->
    <div class="modal fade" id="latestImageModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Latest Processed Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center" id="latestImageContent">
                    <!-- Latest image will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/app.js?v=5"></script>
</body>
</html>
